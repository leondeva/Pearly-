<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Pearly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="spring-day.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="start-screen">
        <h1>I have a special message for you...</h1>
        <button class="yes-button" onclick="startExperience()" style="width: auto;">Tap to Open</button>
    </div>

    <div class="container hidden" id="question-screen">
        <img src="kuromi.png" alt="Kuromi" class="main-img">
        <h1>Pearly will you please forgive me?</h1>
        <div class="buttons">
            <button class="yes-button" onclick="showSuccess()">Yes</button>
            <button class="no-button" id="noButton">No</button>
        </div>
    </div>

    <div class="container hidden" id="success-screen">
        <img src="jimin.jpg" alt="Jimin" class="success-img">
        <h2>Thank you so much for forgiving me, Jimin appreciates you 🙏🏻❤️</h2>
    </div>

    <script>
        // 1. This function plays the music and reveals the Kuromi screen when the Start button is tapped
        function startExperience() {
            const audio = document.getElementById('bgMusic');
            audio.play();
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';
        }

        // 2. Make the "No" button run away
        const noBtn = document.getElementById('noButton');
        
        function moveButton() {
            const padding = 20; 
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault(); 
            moveButton();
        });

        // 3. Switch to Jimin screen when "Yes" is clicked
        function showSuccess() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        }
    </script>
</body>
</html>
